site_name: potpourri
site_description: >-
  Multi-Period Optimal Power Flow for Distribution Grids —
  Pyomo models over pandapower networks.
site_author: Steffen Kortmann, IAEW RWTH Aachen University

theme:
  name: readthedocs

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Mathematical Modelling: mathematical-modelling.md
  - User Guide:
      - Single-Period OPF: user-guide/single-period.md
      - Multi-Period OPF: user-guide/multi-period.md
      - Flexible Devices: user-guide/devices.md
      - Solvers: user-guide/solvers.md
      - Logging: user-guide/logging.md
  - Examples:
      - Overview: scripts/examples.md
      - AC Validation: scripts/validation.md
      - Load-Case OPF: scripts/loadcases.md
      - Feasible Operation Region: scripts/feasible-operation-region.md
  - API Reference:
      - Single-Period Models: api/models.md
      - Multi-Period Models: api/multi-period.md
      - Flexible Devices: api/devices.md
      - Utilities: api/utilities.md
