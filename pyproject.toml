[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "opf-potpourri"            # <- PyPI / pip install name
version = "0.1.0"
description = "[Python] Tool for power system analysis with pandapower"
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE" }
authors = [{ name = "Steffen Kortmann", email = "s.kortmann@iaew.rwth-aachen.de" },
            { name = "Farah Nasr", email = "f.nasr@iaew.rwth-aachen.de" },
]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
]
keywords = ["power systems", "pandapower", "analysis"]
dependencies = [
    "jupyterlab>=4.4.7",
    "matplotlib>=3.9.4",
    "notebook>=7.4.5",
    "numba>=0.60.0",
    "numpy>=2.0.2",
    "pandapower>=3.1.2",
    "pandas>=2.3.2",
    "pyomo>=6.9.4",
    "simbench>=1.6.1",
]

[project.urls]
Homepage = "https://gitlab.iaew.rwth-aachen.de/aev/potpourri/"
Repository = "https://gitlab.iaew.rwth-aachen.de/aev/potpourri/"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "black>=25.1.0",
    "flake8>=7.3.0",
    "pytest>=8.4.2",
]
