[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "potpourri"
version = "1.0"
dependencies = [
  "pandas",
  "numpy",
  "pyomo",
  "pandapower",
  "simbench",
  "matplotlib",
  "tqdm",
]
requires-python = ">=3.8"
authors = [
  {name = "s.kortmann", email = "s.kortmann@iaew.rwth-aachen.de"}
]
description = "[Python] Tool for power system analysis with pandapower"
readme = "README.md"  # Update if your README file is named differently
license = {text = "MIT"}
keywords = ["power systems", "pandapower", "analysis"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11"
]

[project.urls]
Homepage = "https://gitlab.iaew.rwth-aachen.de/aev/potpourri/"
Repository = "https://gitlab.iaew.rwth-aachen.de/aev/potpourri/"

[project.optional-dependencies]
dev = [
  "pytest",
  "black",
  "flake8"
]
